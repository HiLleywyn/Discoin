[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume  -  keeps PostgreSQL data and backups across redeploys.
# Without this, /data is ephemeral and the DB resets on every deploy.
[[mounts]]
source = "discoin_data"
destination = "/data"
