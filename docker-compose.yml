version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: discoin
      POSTGRES_USER: discoin
      POSTGRES_PASSWORD: ${PG_PASSWORD:-discoin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discoin -d discoin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    sysctls:
      - net.core.somaxconn=512
      - vm.overcommit_memory=1
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --stop-writes-on-bgsave-error no --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      API_VERSION: v2
      API_PORT: 8080
      DATABASE_URL: postgresql://discoin:${PG_PASSWORD:-discoin}@postgres:5432/discoin
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"

volumes:
  pgdata:
